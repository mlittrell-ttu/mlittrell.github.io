<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlashCards</title>
  <style>

    /* :root — CSS custom properties (variables) available everywhere.
       Changing a value here updates it throughout the whole file at once. */
    :root {
      --bg:        #f7f2e8;
      --surface:   #fffdf8;
      --border:    #d8cebc;
      --ink:       #2e2416;
      --ink-light: #9e9080;
      --accent:    #e0d5c2;
      --accent2:   #c8bfb0;
      --green:     #8aab8a;
      --shadow:    0 2px 12px rgba(0,0,0,0.10);
      --radius:    10px;
      --flip-time: 0.5s;
    }

    /* CSS reset — strip every element's default browser margin and padding */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* header — cream bar across the top with the title and nav tabs */
    header {
      width: 100%;
      background: var(--bg);
      color: var(--ink);
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow);
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 1.6rem;
      letter-spacing: 0.08em;
      font-weight: normal;
    }

    header h1 span { color: var(--ink-light); } /* mutes the "Cards" part of the title */

    nav { display: flex; gap: 6px; }

    nav button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--ink);
      padding: 7px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      transition: background 0.2s, border-color 0.2s;
    }

    nav button:hover,
    nav button.active { background: var(--accent); border-color: var(--border); }

    nav button.active { border-color: var(--accent2); }

    /* main — the content column below the header */
    main {
      width: 100%;
      max-width: 720px;
      padding: 40px 20px;
    }

    /* sections are hidden by default; only .active is shown */
    section        { display: none; }
    section.active { display: block; }


    /* ── STUDY VIEW ─────────────────────────────────────────── */

    #study-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* shows which deck is currently being studied */
    #study-deck-name {
      font-size: 0.82rem;
      color: var(--ink-light);
      letter-spacing: 0.05em;
      font-style: italic;
    }

    #progress-label {
      font-size: 0.85rem;
      color: var(--ink-light);
      letter-spacing: 0.05em;
    }

    /* .card-scene — the 3D perspective container; the "camera" for the flip effect */
    .card-scene {
      width: 100%;
      max-width: 520px;
      height: 300px;
      perspective: 1000px; /* depth of the 3D space; higher number = more subtle 3D */
      cursor: pointer;
    }

    /* .card-inner — the element that actually rotates during the flip */
    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;  /* children rendered as 3D objects, not flat */
      transition: transform var(--flip-time) ease;
    }

    .card-inner.flipped { transform: rotateY(180deg); }

    /* .card-face — shared styles for both faces of the card */
    .card-face {
      position: absolute;
      inset: 0;  /* shorthand: top/right/bottom/left = 0; fills the parent completely */
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
      backface-visibility: hidden; /* hides this face when it is rotated away from viewer */
      text-align: center;
    }

    .card-face.back {
      transform: rotateY(180deg); /* pre-rotated 180° so it starts hidden */
      background: #f0e9d8;        /* slightly deeper cream to distinguish back from front */
    }

    .card-face .hint {
      position: absolute;
      bottom: 12px;
      font-size: 0.75rem;
      color: var(--ink-light);
      letter-spacing: 0.05em;
    }

    .card-face .card-text {
      font-size: 1.4rem;
      line-height: 1.5;  /* 1.5× font size between lines — prevents cramped text */
      overflow-y: auto;
      max-height: 100%;
      width: 100%;
    }

    .card-face img {
      max-width: 100%;
      max-height: 220px;
      border-radius: 6px;
      object-fit: contain; /* scale to fit without cropping or stretching */
    }

    #rating-buttons { display: flex; gap: 16px; }

    .btn-got-it {
      background: var(--green);
      color: var(--ink);
      border: 1px solid var(--accent2);
      padding: 12px 32px;
      border-radius: 24px;
      font-size: 1rem;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
    }

    .btn-again {
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--border);
      padding: 12px 32px;
      border-radius: 24px;
      font-size: 1rem;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
    }

    .btn-got-it:hover,
    .btn-again:hover { opacity: 0.85; }

    #empty-study {
      text-align: center;
      color: var(--ink-light);
      font-size: 1.1rem;
      padding: 60px 20px;
      line-height: 1.8;
    }


    /* ── MANAGE VIEW ────────────────────────────────────────── */

    /* =============================================================
       DECK ZONE — the contained box at the top of the Manage panel
       that groups everything deck-related: the section label, the
       pill row, and the Load Decks button. Giving it a distinct
       background and border makes it read as one unit rather than
       several floating elements.
       ============================================================= */

    /* outer box — light surface background lifts it off the page */
    #deck-bar-wrap {
      background: var(--surface);          /* slightly lighter than the page bg */
      border: 1px solid var(--border);     /* thin edge defines the zone */
      border-radius: var(--radius);        /* rounded corners match the rest of the app */
      padding: 16px 20px;                  /* breathing room inside the box */
      margin-bottom: 24px;                 /* space between this zone and the toolbar below */
    }

    /* small "DECKS" label at the top of the deck zone */
    #deck-zone-label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 10px;
    }

    /* #deck-bar — responsive grid so deck cards form neat rows.
       repeat(auto-fill, minmax(140px, 1fr)) = fill as many columns
       as fit, each at least 140px wide, sharing leftover space equally. */
    #deck-bar {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }

    /* .deck-pill — each deck is a small card.
       position:relative anchors the absolutely-positioned × button. */
    .deck-pill {
      position: relative;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      overflow: hidden;
    }

    /* .active — currently selected deck; accent fill signals selection */
    .deck-pill.active {
      background: var(--accent);
      border-color: var(--accent2);
      box-shadow: none;
    }

    /* .scratchpad — unsaved cards; dashed border = not backed by a file */
    .deck-pill.scratchpad {
      border-style: dashed;
    }

    /* .load-deck-card — the Load Decks slot; same grid size as deck cards
       but centered + icon and label to signal it is an add-action */
    .load-deck-card {
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 14px 10px;
      font-family: inherit;
      transition: background 0.2s, border-color 0.2s;
    }

    .load-deck-card:hover {
      background: var(--accent);
      border-color: var(--accent2);
    }

    .load-deck-card-icon {
      font-size: 1.2rem;
      color: var(--ink-light);
      line-height: 1;
    }

    .load-deck-card-label {
      font-size: 0.75rem;
      color: var(--ink-light);
    }

    /* invisible overlay button — makes the whole .deck-pill clickable */
    .deck-pill-name {
      position: absolute;
      inset: 0;
      background: none;
      border: none;
      cursor: pointer;
      z-index: 1;
    }

    /* deck name text — normal flow so the card sizes to it */
    .deck-pill-deck-name {
      font-size: 0.85rem;
      font-weight: normal;
      color: var(--ink);
      padding: 12px 32px 4px 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* card count line below the name */
    .deck-pill-count {
      font-size: 0.72rem;
      color: var(--ink-light);
      padding: 0 14px 12px;
    }

    /* × unload button — top-right corner, above the overlay */
    .deck-pill-unload {
      position: absolute;
      top: 6px;
      right: 6px;
      z-index: 2;
      background: none;
      border: none;
      font-size: 0.85rem;
      color: var(--ink-light);
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 4px;
      line-height: 1;
      transition: background 0.15s, color 0.15s;
    }

    .deck-pill-unload:hover { background: var(--accent2); color: var(--ink); }


    /* ── CARDS CONTAINER ───────────────────────────────────── */

    /* The cards container wraps the toolbar header and the card grid
       into one box, making it visually clear the toolbar acts on the
       cards below it rather than floating as a separate section. */
    #cards-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;              /* clips the header's background to rounded corners */
      margin-bottom: 0;
    }

    /* toolbar header — flush top of the cards container.
       Slightly warmer cream background distinguishes it from the
       white card surface without being jarring. */
    #cards-toolbar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 16px;
      background: #f0e8d8;           /* warm cream — one step deeper than --bg */
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 8px;
    }

    /* context label — now sits inside the toolbar header on the left */
    #manage-context-label {
      font-size: 0.78rem;
      color: var(--ink-light);
      font-style: italic;
      flex: 1;                       /* pushes buttons to the right */
      min-width: 0;                  /* allows text to truncate if narrow */
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* button group on the right side of the toolbar header */
    .manage-toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      flex-shrink: 0;                /* never shrinks — buttons stay together */
    }

    /* card grid inside the container — padded from the box edges */
    #card-list-wrap {
      padding: 14px;
    }


    /* ── SHARED BUTTON STYLES ───────────────────────────────── */

    .btn-primary {
      background: var(--accent);
      color: var(--ink);
      border: 1px solid var(--accent2);
      padding: 12px 32px;
      border-radius: 24px;
      font-size: 0.95rem;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.04em;
      transition: background 0.2s;
    }

    .btn-primary:hover { background: var(--border); }

    .btn-secondary {
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--border);
      padding: 9px 20px;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }

    .btn-secondary:hover { background: var(--border); }


    /* ── CARD LIST ──────────────────────────────────────────── */

    /* #card-list-wrap — padded inner area of the cards container */
    #card-list-wrap {
      padding: 14px;
    }

    /* Grid so cards form rows and auto-wrap.
       minmax(160px, 1fr) = each card at least 160px, sharing leftover space. */
    #card-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }

    /* Each card — flex column so front / back / footer stack vertically.
       position:relative anchors the absolutely-positioned drag dots. */
    .card-list-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      cursor: grab;
      position: relative;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .card-list-item:hover { border-color: var(--accent2); }

    .card-list-item.dragging { opacity: 0.4; }

    /* Front face — white, holds the question / term */
    .cli-front {
      padding: 12px 28px 10px 12px; /* right padding leaves room for drag dots */
      border-bottom: 1px solid #f0e9d8;
      font-size: 0.82rem;
      color: var(--ink);
      line-height: 1.4;
      min-height: 52px;  /* consistent card height even for short questions */
      overflow: hidden;
    }

    /* Image preview inside the front face */
    .cli-front img {
      max-width: 100%;
      max-height: 80px;
      border-radius: 4px;
      object-fit: contain;
      display: block;
    }

    /* Back face — slightly warmer cream, holds the answer */
    .cli-back {
      padding: 8px 12px 10px;
      background: #f7efe0;
      font-size: 0.76rem;
      color: var(--ink-light);
      line-height: 1.4;
      min-height: 44px;
      flex: 1;           /* grows to fill remaining card height */
      overflow: hidden;
    }

    /* Image preview inside the back face */
    .cli-back img {
      max-width: 100%;
      max-height: 60px;
      border-radius: 4px;
      object-fit: contain;
      display: block;
    }

    /* Footer row — Edit and Delete buttons */
    .cli-footer {
      padding: 6px 10px 7px;
      display: flex;
      justify-content: flex-end;
      gap: 5px;
      border-top: 1px solid #f0e9d8;
    }

    /* Subtle drag-dot grid — top-right corner, low opacity.
       position:absolute so it floats above the front face text. */
    .drag-dots {
      position: absolute;
      top: 7px;
      right: 7px;
      display: grid;
      grid-template-columns: repeat(2, 3px);
      gap: 2.5px;
      opacity: 0.35;       /* quiet — noticeable on inspection, not competing */
      pointer-events: none; /* never intercepts clicks meant for the card */
    }

    /* Each dot */
    .drag-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--ink-light);
    }

    .btn-delete {
      background: none;
      border: 1px solid var(--border);
      color: var(--ink-light);
      border-radius: 4px;
      padding: 2px 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.7rem;
      transition: background 0.2s;
    }

    .btn-delete:hover { background: #f5ede0; color: var(--ink); }

    #empty-manage {
      text-align: center;
      color: var(--ink-light);
      padding: 60px 0;
      line-height: 1.8;
    }


    /* ── DROP ZONES ─────────────────────────────────────────── */

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 20px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .drop-zone.drag-over { border-color: var(--accent2); background: #f5ede0; }

    .drop-zone textarea {
      width: 100%;
      border: none;
      background: transparent;
      resize: none;
      font-family: inherit;
      font-size: 1rem;
      color: var(--ink);
      outline: none;
      min-height: 80px;
    }

    .drop-zone img {
      max-width: 100%;
      max-height: 180px;
      border-radius: 6px;
      object-fit: contain;
    }

    .drop-hint { font-size: 0.78rem; color: var(--ink-light); }

    .clear-img-btn {
      font-size: 0.75rem;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
      text-decoration: underline;
    }

    .field-group { margin-bottom: 24px; }

    .field-group label {
      display: block;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 8px;
    }


    /* ── MODAL ──────────────────────────────────────────────── */

    /* .modal-overlay — full-screen dim layer locked to the viewport */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100; /* above everything else on the page */
    }

    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh; /* never taller than 90% of screen height */
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }

    #modal-title {
      font-weight: normal;
      font-size: 1.2rem;
      color: var(--ink-light);
      letter-spacing: 0.05em;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.4rem;
      color: var(--ink-light);
      cursor: pointer;
      line-height: 1;
      padding: 0 4px;
      transition: color 0.2s;
    }

    .modal-close:hover { color: var(--ink); }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 8px;
      align-items: center;
    }


    /* ── SAVE TOAST ─────────────────────────────────────────────
       A small notification that briefly appears at the bottom of
       the screen after a silent save, confirming the write happened.
       Uses the same opacity fade pattern as the old "Card saved!" span.
       position:fixed keeps it locked to the viewport regardless of scroll.
       pointer-events:none means it never blocks clicks underneath it. */
    #save-toast {
      position: fixed;                  /* locked to the viewport, not the page */
      bottom: 32px;                     /* 32px from the bottom edge of the screen */
      left: 50%;                        /* start at horizontal center */
      transform: translateX(-50%);      /* shift left by half its own width to truly center it */
      background: var(--ink);           /* dark background — contrasts with the cream page */
      color: var(--surface);            /* light text on the dark background */
      font-family: 'Georgia', serif;    /* match the app font */
      font-size: 0.88rem;
      letter-spacing: 0.04em;
      padding: 10px 22px;
      border-radius: var(--radius);     /* same rounded corners as other boxes */
      box-shadow: var(--shadow);
      opacity: 0;                       /* invisible by default */
      pointer-events: none;             /* never intercepts mouse clicks */
      transition: opacity 0.25s ease;   /* smooth fade in and out */
      z-index: 200;                     /* above the modal overlay (z-index:100) */
      white-space: nowrap;              /* keep the message on one line */
    }

    /* .visible — JS adds this class to show the toast, removes it to hide */
    #save-toast.visible {
      opacity: 1;  /* fully opaque when visible */
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>Flash<span>Cards</span></h1>
    <nav>
      <button onclick="showView('study')" class="active" id="tab-study">Study</button>
      <button onclick="showView('manage')" id="tab-manage">Manage</button>
    </nav>
  </header>

  <main>

    <!-- ============================================================
         STUDY VIEW
         Studies only the active deck (or scratchpad if none selected).
         #study-deck-name shows what is being studied.
         ============================================================ -->
    <section id="view-study" class="active">
      <div id="study-area">

        <!-- Empty / completion message — JS writes content dynamically -->
        <div id="empty-study">
          No cards yet!<br>Go to <strong>Manage</strong> to load a deck or add cards.
        </div>

        <!-- The live study deck — hidden until JS confirms cards exist.
             Layout properties are inline because they only apply when JS shows this element. -->
        <div id="study-deck" style="display:none; width:100%; flex-direction:column; align-items:center; gap:24px;">

          <div id="study-deck-name"></div>  <!-- e.g. "Studying: Biology 101" -->

          <button id="btn-shuffle" class="btn-secondary" onclick="toggleShuffle()">⇄ Shuffle</button>
          <div id="progress-label"></div>

          <!-- 3D flip card -->
          <div class="card-scene" onclick="flipCard()">
            <div class="card-inner" id="card-inner">
              <div class="card-face front">
                <div class="card-text" id="card-front-content"></div>
                <div class="hint">click to reveal</div>
              </div>
              <div class="card-face back">
                <div class="card-text" id="card-back-content"></div>
                <div class="hint">how did you do?</div>
              </div>
            </div>
          </div>

          <!-- Rating buttons — hidden until card is flipped -->
          <div id="rating-buttons" style="display:none;">
            <button class="btn-again"  onclick="rateCard(false)">Review Again</button>
            <button class="btn-got-it" onclick="rateCard(true)">Got It</button>
          </div>

        </div>
      </div>
    </section>


    <!-- ============================================================
         MANAGE VIEW

         Top to bottom:
           1. Deck bar  — pill row + Load Decks button
           2. Toolbar   — + Add Card, Save Deck
           3. Context   — "Editing: Name (N cards)"
           4. Card list
         ============================================================ -->
    <section id="view-manage">

      <!-- DECK ZONE ─────────────────────────────────────────────
           A contained box grouping all deck-level controls:
             - "DECKS" section label
             - #deck-bar pill row (rebuilt by renderDeckBar())
               The Load Decks button lives at the start of this row
               so that decks and their loader read as one unit.
           The box has its own background and border so it reads
           as a distinct zone above the card-level toolbar.
      ──────────────────────────────────────────────────────────── -->
      <div id="deck-bar-wrap">

        <!-- small uppercase section label -->
        <span id="deck-zone-label">Decks</span>

        <!-- The hidden file input lives here — outside #deck-bar —
             so that bar.innerHTML = '' in renderDeckBar() never wipes it.
             The Load Decks button is created fresh inside renderDeckBar()
             on every call and clicks this input programmatically. -->
        <input type="file"
               id="deck-load-input"
               multiple
               accept=".json"
               style="display:none"
               onchange="loadDecks(event)" />

        <!-- renderDeckBar() fills #deck-bar on every call:
             first item is always the Load Decks button (created in JS),
             followed by one pill per loaded deck. -->
        <div id="deck-bar"></div>
      </div>

      <!-- CARDS CONTAINER ─────────────────────────────────────────
           One box wrapping the toolbar header and the card grid.
           The toolbar is the header of this box — tethered visually
           to the cards it acts on rather than floating separately.
           #cards-toolbar-header = the warm cream strip at the top
           #card-list-wrap       = padded area holding the card grid
      ──────────────────────────────────────────────────────────── -->
      <div id="cards-container">

        <!-- Toolbar header — context label left, action buttons right -->
        <div id="cards-toolbar-header">

          <!-- Context label: "Biology 101 · 12 cards" or empty.
               renderContextLabel() writes its textContent here. -->
          <div id="manage-context-label"></div>

          <!-- Action buttons — operate on the active deck's cards -->
          <div class="manage-toolbar">
            <button class="btn-secondary" onclick="openAddModal()">&#43; Add Card</button>
            <!-- &#43; = + -->
            <button class="btn-secondary" onclick="exportJSON()">&#8595; Save Deck</button>
            <!-- &#8595; = ↓ -->
            <button class="btn-secondary" onclick="saveAsJSON()">&#8599; Save As</button>
            <!-- &#8599; = ↗ -->
          </div>
        </div>

        <!-- Card grid and empty state sit inside the padded inner area -->
        <div id="card-list-wrap">
          <div id="card-list"></div>
          <div id="empty-manage" style="display:none;"></div>
        </div>

      </div>

    </section>

  </main>


  <!-- =============================================================
       SHARED MODAL — "New Card" mode and "Edit Card" mode.

       editIndex controls which mode is active:
         null      → New Card  — save pushes a new card
         a number  → Edit Card — save overwrites cards[editIndex]

       Drop zone IDs:
         drop-modal-front / text-modal-front
         drop-modal-back  / text-modal-back
  ============================================================= -->
  <div class="modal-overlay" id="card-modal" style="display:none;">
    <div class="modal-box">

      <div class="modal-header">
        <h2 id="modal-title">New Card</h2>
        <button class="modal-close" onclick="closeModal()">&#x2715;</button>
        <!-- &#x2715; = × -->
      </div>

      <div class="field-group">
        <label>Front &mdash; type text or drop an image</label>
        <div class="drop-zone" id="drop-modal-front">
          <textarea id="text-modal-front"
                    placeholder="Question, term, or concept&hellip;"
                    rows="3"></textarea>
          <div class="drop-hint">&mdash; or drag &amp; drop an image here &mdash;</div>
        </div>
      </div>

      <div class="field-group">
        <label>Back &mdash; type text or drop an image</label>
        <div class="drop-zone" id="drop-modal-back">
          <textarea id="text-modal-back"
                    placeholder="Answer, definition, or label&hellip;"
                    rows="3"></textarea>
          <div class="drop-hint">&mdash; or drag &amp; drop an image here &mdash;</div>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-primary" id="modal-save-btn" onclick="saveModal()">Save Card</button>
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      </div>

    </div>
  </div>


  <!-- SAVE TOAST — shown briefly after a silent save.
       JS targets this by id="save-toast";
       showToast() adds/removes the .visible class. -->
  <div id="save-toast"></div>

  <script>

    /*
     * ============================================================
     * FLASHCARDS — JavaScript
     * ============================================================
     *
     * DECK SYSTEM
     * -----------
     * decks[]        — array of loaded deck objects, each:
     *                  { name: string, cards: [], dirty: boolean }
     *                  name  = filename without .json
     *                  cards = array of card objects
     *                  dirty = true when cards changed since last Save
     *
     * activeDeckIdx  — integer:
     *                  -1   = no deck selected (scratchpad mode)
     *                  0+   = index of active deck in decks[]
     *
     * scratchCards   — cards created while no deck is active;
     *                  not backed by any file
     *
     * cards          — always a reference to the currently active
     *                  cards array. Updated by syncCards() on every
     *                  deck switch. All card-level functions use this
     *                  variable so they work correctly in both modes.
     *
     * Card object shape:
     *   { id, front, back, frontImg, backImg, interval }
     * ============================================================
     */


    /* -----------------------------------------------------------
     * DATA STORE
     * ----------------------------------------------------------- */

    var decks         = [];           /* array of { name, cards, dirty } */
    var activeDeckIdx = -1;           /* -1 = scratchpad; 0+ = index in decks[] */
    var scratchCards  = [];           /* unsaved cards with no deck */
    var cards         = scratchCards; /* reference to the active cards array */


    /* syncCards updates the `cards` reference to point at the correct array.
       Because `cards` is a reference, pushing or splicing through it
       also modifies the underlying deck or scratchpad array directly. */
    function syncCards() {
      cards = activeDeckIdx >= 0 ? decks[activeDeckIdx].cards : scratchCards;
    }

    /* isDirty — true when the active file-backed deck has unsaved changes.
       Scratchpad is handled separately (it has no file to compare against). */
    function isDirty() {
      return activeDeckIdx >= 0 && decks[activeDeckIdx].dirty;
    }

    /* markDirty — call after any add, edit, delete, or reorder */
    function markDirty() {
      if (activeDeckIdx >= 0) decks[activeDeckIdx].dirty = true;
    }

    /* clearDirty — call after a successful Save Deck export */
    function clearDirty() {
      if (activeDeckIdx >= 0) decks[activeDeckIdx].dirty = false;
    }


    /* -----------------------------------------------------------
     * DECK MANAGEMENT
     * ----------------------------------------------------------- */

    /* setActiveDeck switches focus to the deck at idx (-1 = scratchpad).
       Warns if the current deck has unsaved changes before switching. */
    function setActiveDeck(idx) {
      if (idx === activeDeckIdx) return; /* already on this one — do nothing */

      /* unsaved-changes warning only applies to file-backed decks */
      if (isDirty()) {
        if (!confirm(
          '"' + decks[activeDeckIdx].name + '" has unsaved changes.\n' +
          'Switch away without saving? Changes will be lost.'
        )) return; /* user cancelled */
        clearDirty();
      }

      activeDeckIdx = idx; /* update the index */
      syncCards();          /* point `cards` at the new active array */
      renderDeckBar();
      renderManageList();
      renderContextLabel();
      initStudy();
    }



    /* openLoadDecks is called by the Load Decks button.
       Chrome/Edge: uses showOpenFilePicker to get writable FileSystemFileHandles.
         Storing the handle is the key fix for the deleted-card-reappears bug:
         the old <input> path gave only a read-only File with no path -- nothing
         to write back to. With a handle, exportJSON() can write directly to the
         source file so saves actually overwrite the original.
       Firefox: falls back to clicking the hidden <input type="file"> element. */
    async function openLoadDecks() {
      if (window.showOpenFilePicker) {
        try {
          var handles = await window.showOpenFilePicker({
            multiple: true,
            types: [{ description: 'JSON Deck Files', accept: { 'application/json': ['.json'] } }]
          });
          /* use a for loop not forEach -- await inside forEach does not pause as expected */
          for (var i = 0; i < handles.length; i++) {
            var handle = handles[i];
            try {
              var file = await handle.getFile(); /* get the File object from the handle */
              var text = await file.text();       /* read its contents as a string */
              addDeckFromFileAndHandle(handle.name, text, handle); /* parse and push */
            } catch (readErr) {
              alert('Could not read "' + handle.name + '": ' + readErr.message);
            }
          }
        } catch (err) {
          if (err.name !== 'AbortError') alert('Could not open files: ' + err.message);
        }
      } else {
        document.getElementById('deck-load-input').click(); /* Firefox fallback */
      }
    }


    /* addDeckFromFileAndHandle parses a JSON text string and pushes a deck.
       Used by both load paths so the parse/deduplicate/push logic is not duplicated.
       filename -- file name with extension e.g. "deck_a.json"
       text     -- raw JSON string from the file
       handle   -- FileSystemFileHandle (Chrome) or null (Firefox)
       The handle is stored on the deck object so exportJSON() can write
       directly back to the source file on subsequent saves. */
    function addDeckFromFileAndHandle(filename, text, handle) {
      try {
        var imported = JSON.parse(text); /* JSON text -> JS array */
        if (!Array.isArray(imported)) {
          alert('"' + filename + '" is not a valid deck file.'); return;
        }
        var deckName = filename.replace(/\.json$/i, ''); /* strip .json */
        var duplicate = decks.some(function(d) { return d.name === deckName; });
        if (duplicate) {
          alert('A deck named "' + deckName + '" is already loaded.'); return;
        }
        decks.push({
          name:       deckName,
          cards:      imported,
          dirty:      false,
          fileHandle: handle || null  /* null when loaded via Firefox <input> */
        });
        if (decks.length === 1 && activeDeckIdx === -1 && scratchCards.length === 0) {
          activeDeckIdx = 0;
          syncCards();
        }
        renderDeckBar(); renderManageList(); renderContextLabel(); initStudy();
      } catch (err) {
        alert('Could not read "' + filename + '" -- make sure it is a valid FlashDeck JSON file.');
      }
    }


    /* loadDecks handles the multi-file input after the user picks JSON files.
       Each file becomes a new deck object added to decks[].
       Loading is additive — existing decks are not replaced.

       Array.from() converts the browser's FileList into a plain JS array
       so we can use forEach on it. */
    /* loadDecks handles the Firefox <input type="file"> fallback.
       Called by onchange on the hidden #deck-load-input element.
       Reads each selected file with FileReader and hands off to
       addDeckFromFileAndHandle() with null as the handle (the <input>
       path cannot provide a writable FileSystemFileHandle). */
    function loadDecks(event) {
      var files = Array.from(event.target.files); /* FileList -> plain array */
      if (!files.length) return;

      files.forEach(function(file) {
        var reader = new FileReader();
        reader.onload = function(e) {
          /* pass null for handle -- <input> files are read-only snapshots */
          addDeckFromFileAndHandle(file.name, e.target.result, null);
        };
        reader.readAsText(file); /* read file as text; triggers reader.onload when done */
      });

      event.target.value = ''; /* reset so the same file can be re-selected if needed */
    }


    /* unloadDeck removes the deck at idx from decks[].
       Warns if the deck has unsaved changes.
       If the removed deck was active, falls back to scratchpad mode. */
    function unloadDeck(idx) {
      if (decks[idx].dirty) {
        if (!confirm(
          '"' + decks[idx].name + '" has unsaved changes.\n' +
          'Unload anyway? Changes will be lost.'
        )) return;
      }

      /* if the deck being removed is the active one, fall back to scratchpad */
      if (activeDeckIdx === idx) {
        activeDeckIdx = -1;
        syncCards();
      } else if (activeDeckIdx > idx) {
        /* active deck's index shifts down by one because an earlier item was removed */
        activeDeckIdx--;
      }

      decks.splice(idx, 1); /* remove one item at position idx */

      renderDeckBar();
      renderManageList();
      renderContextLabel();
      initStudy();
    }


    /* renderDeckBar rebuilds the pill row from scratch on every call.
       ─────────────────────────────────────────────────────────────
       BUG FIX: the previous version stored a hint <span> in the HTML
       and tried to reference it by ID after bar.innerHTML = '' had
       already removed it from the DOM. getElementById returns null for
       elements not in the DOM, causing a "Cannot read properties of null"
       error that halted the function before any pills were built.

       The fix: renderDeckBar creates ALL of its child elements fresh
       with createElement on every call. Nothing is referenced by ID
       inside this function — there is nothing to go null. */
    function renderDeckBar() {
      var bar = document.getElementById('deck-bar');
      bar.innerHTML = ''; /* wipe all children — rebuilding everything fresh */

      /* build one card per deck in decks[] */
      decks.forEach(function(deck, idx) {
        var card = document.createElement('div');
        card.className = 'deck-pill' + (idx === activeDeckIdx ? ' active' : '');
        card.title = deck.dirty ? deck.name + ' (unsaved changes)' : deck.name;

        /* invisible full-card overlay — activates this deck on click.
           z-index:1 so the × button (z-index:2) intercepts its own clicks first. */
        var overlay = document.createElement('button');
        overlay.className = 'deck-pill-name';
        overlay.setAttribute('aria-label', 'Select deck ' + deck.name);
        overlay.onclick = (function(i) {
          return function() { setActiveDeck(i); };
        })(idx);

        /* deck name — normal flow so the card height grows with the text */
        var nameEl = document.createElement('div');
        nameEl.className = 'deck-pill-deck-name';
        nameEl.textContent = deck.name + (deck.dirty ? ' •' : '');

        /* card count below the name */
        var countEl = document.createElement('div');
        countEl.className = 'deck-pill-count';
        var n = deck.cards.length;
        countEl.textContent = n + ' card' + (n !== 1 ? 's' : '');

        /* × unload button — z-index:2 sits above the overlay */
        var unloadBtn = document.createElement('button');
        unloadBtn.className   = 'deck-pill-unload';
        unloadBtn.textContent = '×';
        unloadBtn.title       = 'Unload "' + deck.name + '"';
        unloadBtn.onclick = (function(i) {
          return function(e) {
            e.stopPropagation();
            unloadDeck(i);
          };
        })(idx);

        card.appendChild(overlay);
        card.appendChild(nameEl);
        card.appendChild(countEl);
        card.appendChild(unloadBtn);
        bar.appendChild(card);
      });

      /* scratchpad card — shown when scratchCards has cards, no × button */
      if (scratchCards.length > 0) {
        var card = document.createElement('div');
        card.className = 'deck-pill scratchpad' + (activeDeckIdx === -1 ? ' active' : '');
        card.title = 'Cards not yet saved to any file';

        var overlay = document.createElement('button');
        overlay.className = 'deck-pill-name';
        overlay.setAttribute('aria-label', 'Select unsaved cards');
        overlay.onclick = function() { setActiveDeck(-1); };

        var nameEl = document.createElement('div');
        nameEl.className   = 'deck-pill-deck-name';
        nameEl.textContent = 'Unsaved';

        var countEl = document.createElement('div');
        countEl.className   = 'deck-pill-count';
        var ns = scratchCards.length;
        countEl.textContent = ns + ' card' + (ns !== 1 ? 's' : '');

        card.appendChild(overlay);
        card.appendChild(nameEl);
        card.appendChild(countEl);
        bar.appendChild(card);
      }

      /* Load Decks card-slot — always last in the grid */
      var loadCard = document.createElement('button');
      loadCard.className = 'load-deck-card';
      loadCard.onclick   = function() { openLoadDecks(); };
      loadCard.title     = 'Load deck files';

      var icon = document.createElement('div');
      icon.className   = 'load-deck-card-icon';
      icon.textContent = '+';

      var label = document.createElement('div');
      label.className   = 'load-deck-card-label';
      label.textContent = 'Load decks';

      loadCard.appendChild(icon);
      loadCard.appendChild(label);
      bar.appendChild(loadCard);
    }


    /* renderContextLabel updates the "Editing: Name (N cards)" line
       above the card list in the Manage panel. */
    function renderContextLabel() {
      var el = document.getElementById('manage-context-label');

      if (activeDeckIdx >= 0) {
        var deck = decks[activeDeckIdx];
        var n    = deck.cards.length;
        el.textContent = 'Editing: ' + deck.name +
                         ' (' + n + ' card' + (n !== 1 ? 's' : '') + ')' +
                         (deck.dirty ? ' — unsaved changes' : '');
      } else if (scratchCards.length > 0) {
        var n = scratchCards.length;
        el.textContent = 'Editing: Unsaved cards ' +
                         '(' + n + ' card' + (n !== 1 ? 's' : '') + ') — not saved to any deck';
      } else {
        el.textContent = ''; /* nothing active — show nothing */
      }
    }


    /* -----------------------------------------------------------
     * VIEW SWITCHING
     * ----------------------------------------------------------- */

    function showView(name) {
      /* remove active from all sections (hides every panel) */
      document.querySelectorAll('section').forEach(function(s) {
        s.classList.remove('active');
      });

      /* remove active from all nav buttons */
      document.querySelectorAll('nav button').forEach(function(b) {
        b.classList.remove('active');
      });

      /* show the chosen panel and highlight its tab */
      document.getElementById('view-' + name).classList.add('active');
      document.getElementById('tab-'  + name).classList.add('active');

      if (name === 'study')  initStudy();
      if (name === 'manage') {
        renderDeckBar();
        renderManageList();
        renderContextLabel();
      }
    }


    /* -----------------------------------------------------------
     * DROP ZONE SETUP
     * -----------------------------------------------------------
     * Attaches drag-and-drop image behaviour to one drop zone.
     * FileReader converts the dropped image to a base64 string —
     * a text representation that can live inside a JSON file.
     */

    function setupDropZone(zoneId, textareaId) {
      var zone     = document.getElementById(zoneId);
      var textarea = document.getElementById(textareaId);

      /* dragover fires continuously while a file hovers over the zone.
         e.preventDefault() is CRITICAL — without it the drop event never fires. */
      zone.addEventListener('dragover', function(e) {
        e.preventDefault();
        zone.classList.add('drag-over');
      });

      zone.addEventListener('dragleave', function() {
        zone.classList.remove('drag-over');
      });

      zone.addEventListener('drop', function(e) {
        e.preventDefault();
        zone.classList.remove('drag-over');

        var file = e.dataTransfer.files[0]; /* first dropped file */
        if (!file || !file.type.startsWith('image/')) return; /* images only */

        var reader = new FileReader();

        reader.onload = function(event) {
          var base64 = event.target.result; /* "data:image/jpeg;base64,..." string */

          textarea.style.display = 'none';                         /* hide text input */
          zone.querySelector('.drop-hint').style.display = 'none'; /* hide hint text */

          /* remove any previously dropped image or remove-button */
          var existing    = zone.querySelector('img');
          var existingBtn = zone.querySelector('.clear-img-btn');
          if (existing)    existing.remove();
          if (existingBtn) existingBtn.remove();

          /* three-step: createElement → set properties → appendChild */
          var img = document.createElement('img');
          img.src = base64;
          zone.appendChild(img);

          /* store base64 on the element's dataset so saveModal() can read it later.
             Local variables disappear when a function ends; dataset persists. */
          zone.dataset.imgData = base64;

          var btn       = document.createElement('button');
          btn.textContent = 'Remove image';
          btn.className   = 'clear-img-btn';
          btn.onclick     = function() { clearDropZone(zoneId, textareaId); };
          zone.appendChild(btn);
        };

        reader.readAsDataURL(file); /* start async read; triggers reader.onload when done */
      });
    }


    /* clearDropZone resets a drop zone to its blank text-input state */
    function clearDropZone(zoneId, textareaId) {
      var zone     = document.getElementById(zoneId);
      var textarea = document.getElementById(textareaId);

      delete zone.dataset.imgData; /* delete removes the property entirely */

      var img = zone.querySelector('img');
      var btn = zone.querySelector('.clear-img-btn');
      if (img) img.remove();
      if (btn) btn.remove();

      /* setting display = '' removes the inline style,
         handing control back to the stylesheet which shows them normally */
      zone.querySelector('.drop-hint').style.display = '';
      textarea.style.display = '';
      textarea.value = ''; /* clear any typed text */
    }


    /* -----------------------------------------------------------
     * STUDY MODE
     * ----------------------------------------------------------- */

    var studyQueue   = [];
    var gotItCount   = 0;
    var totalCount   = 0;
    var shuffleOn    = false;
    var dragSrcIndex = null; /* tracks which manage row is being dragged */

    function toggleShuffle() {
      shuffleOn = !shuffleOn; /* flip the boolean */

      var btn = document.getElementById('btn-shuffle');
      if (shuffleOn) {
        btn.style.background  = 'var(--accent)';
        btn.style.color       = 'white';
        btn.style.borderColor = 'var(--accent)';
      } else {
        btn.style.background  = ''; /* '' restores stylesheet control */
        btn.style.color       = '';
        btn.style.borderColor = '';
      }

      initStudy();
    }

    function initStudy() {
      if (cards.length === 0) {
        /* tailor the empty message to the current state */
        var msg;
        if (activeDeckIdx >= 0) {
          msg = 'No cards in <strong>' + decks[activeDeckIdx].name + '</strong>.<br>' +
                'Go to <strong>Manage</strong> to add some.';
        } else {
          msg = 'No cards yet!<br>Go to <strong>Manage</strong> to load a deck or add cards.';
        }
        document.getElementById('empty-study').innerHTML    = msg;
        document.getElementById('empty-study').style.display = '';
        document.getElementById('study-deck').style.display  = 'none';
        return;
      }

      /* slice() makes a shallow copy — removing from studyQueue won't affect cards[] */
      studyQueue = cards.slice();

      /* Fisher-Yates shuffle if shuffle mode is on */
      if (shuffleOn) {
        for (var i = studyQueue.length - 1; i > 0; i--) {
          var j    = Math.floor(Math.random() * (i + 1));
          var temp = studyQueue[i];
          studyQueue[i] = studyQueue[j];
          studyQueue[j] = temp;
        }
      }

      gotItCount = 0;
      totalCount = cards.length;

      /* update the deck name label above the shuffle button */
      document.getElementById('study-deck-name').textContent =
        activeDeckIdx >= 0
          ? 'Studying: ' + decks[activeDeckIdx].name
          : 'Studying: Unsaved Cards';

      document.getElementById('empty-study').style.display = 'none';
      document.getElementById('study-deck').style.display  = 'flex';
      loadCard();
    }

    function loadCard() {
      if (studyQueue.length === 0) { /* session complete */
        document.getElementById('study-deck').style.display  = 'none';
        document.getElementById('empty-study').style.display = '';
        document.getElementById('empty-study').innerHTML =
          '&#127881; All ' + totalCount + ' cards mastered!<br><br>' +
          '<button class="btn-primary" onclick="initStudy()">Study Again</button>';
        return;
      }

      var card = studyQueue[0]; /* index 0 is always the current card */

      /* \u00B7 = · middle dot character */
      document.getElementById('progress-label').textContent =
        'Got It: ' + gotItCount + ' / ' + totalCount +
        '  \u00B7  Remaining: ' + studyQueue.length;

      setCardContent('card-front-content', card.frontImg, card.front);
      setCardContent('card-back-content',  card.backImg,  card.back);

      /* Reset the card to the front face WITHOUT animating.
         If we just remove 'flipped' normally the CSS transition fires —
         the card rotates 180° back to front and the back face briefly
         flashes into view during that spin.

         Fix: disable the transition, snap to front instantly, then force
         the browser to process that paint by calling getBoundingClientRect()
         (this triggers a reflow — the browser must commit the current state
         before continuing). Then re-enable the transition so the next
         user-triggered flip still animates smoothly.

         inner.style.transition = 'none'  overrides the stylesheet rule.
         inner.style.transition = ''      removes the inline override,
                                          handing control back to CSS. */
      var inner = document.getElementById('card-inner');
      inner.style.transition = 'none';    /* disable flip animation temporarily */
      inner.classList.remove('flipped');  /* instantly snap to front — no spin */
      inner.getBoundingClientRect();      /* force reflow so the browser processes
                                            the above before the next line runs */
      inner.style.transition = '';        /* restore CSS animation for next user flip */
      document.getElementById('rating-buttons').style.display = 'none';
    }

    /* fills one card face with an image or text */
    function setCardContent(elementId, imgData, text) {
      var el = document.getElementById(elementId);
      if (imgData) {
        el.innerHTML = '<img src="' + imgData + '" alt="card image">';
      } else {
        el.textContent = text || '';
      }
    }

    function flipCard() {
      var inner   = document.getElementById('card-inner');
      var flipped = inner.classList.toggle('flipped'); /* toggle returns true if class was added */
      document.getElementById('rating-buttons').style.display = flipped ? 'flex' : 'none';
    }

    function rateCard(gotIt) {
      var card = studyQueue.shift(); /* shift() removes and returns the FIRST item */
      if (gotIt) {
        card.interval = Math.min(card.interval * 2, 30); /* double, cap at 30 */
        gotItCount++;
      } else {
        card.interval = 1;
        studyQueue.push(card); /* push to END — comes back around later */
      }
      loadCard();
    }


    /* -----------------------------------------------------------
     * MANAGE VIEW
     * ----------------------------------------------------------- */

    /* escapeHtml converts the five characters that have special meaning in
       HTML into their safe entity equivalents before injecting text via
       innerHTML. Without this, card text containing < > & ' " would
       break the card structure or create unintended HTML elements.
       e.g. "x < y" would inject a broken tag; "&amp;" renders as "&". */
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g,  '&amp;')   /* & must come first to avoid double-escaping */
        .replace(/</g,  '&lt;')
        .replace(/>/g,  '&gt;')
        .replace(/"/g,  '&quot;')
        .replace(/'/g,  '&#39;');
    }


    function renderManageList() {
      var list  = document.getElementById('card-list');
      var empty = document.getElementById('empty-manage');
      list.innerHTML = ''; /* wipe before rebuilding */

      if (cards.length === 0) {
        /* tailor the empty message to the current context */
        empty.style.display = '';
        if (activeDeckIdx >= 0) {
          empty.innerHTML = 'No cards in <strong>' + decks[activeDeckIdx].name +
                            '</strong>.<br>Hit &ldquo;+ Add Card&rdquo; to create one.';
        } else if (decks.length > 0) {
          empty.innerHTML = 'Select a deck above to view its cards,<br>' +
                            'or hit &ldquo;+ Add Card&rdquo; to start a new unsaved set.';
        } else {
          empty.innerHTML = 'No decks loaded.<br>Use &ldquo;Load Decks&rdquo; to open JSON files,<br>' +
                            'or hit &ldquo;+ Add Card&rdquo; to start fresh.';
        }
        return;
      }
      empty.style.display = 'none';

      cards.forEach(function(card, index) {
        var item = document.createElement('div');
        item.className = 'card-list-item';
        item.draggable = true;

        item.addEventListener('dragstart', function() {
          dragSrcIndex = index;
          item.classList.add('dragging');
        });

        item.addEventListener('dragend', function() {
          item.classList.remove('dragging');
        });

        item.addEventListener('dragover', function(e) {
          e.preventDefault(); /* required to allow the drop event to fire */
        });

        item.addEventListener('drop', function() {
          if (dragSrcIndex === null || dragSrcIndex === index) return;
          var moved = cards.splice(dragSrcIndex, 1)[0]; /* remove from old position */
          cards.splice(index, 0, moved);                /* insert at new position */
          dragSrcIndex = null;
          markDirty();
          renderManageList();
          renderContextLabel();
        });

        /* Build the front face content — image or truncated text.
           We keep truncation for text so cards don't grow too tall;
           the full content is visible in the Edit modal. */
        var frontContent = card.frontImg
          ? '<img src="' + card.frontImg + '" alt="card image">'
          : escapeHtml((card.front || '').substring(0, 60) +
              ((card.front || '').length > 60 ? '...' : ''));

        var backContent = card.backImg
          ? '<img src="' + card.backImg + '" alt="card image">'
          : escapeHtml((card.back || '').substring(0, 60) +
              ((card.back || '').length > 60 ? '...' : ''));

        /* card structure:
             .drag-dots   — subtle 2x3 dot grid top-right corner
             .cli-front   — question / term (white background)
             .cli-back    — answer / definition (warm cream)
             .cli-footer  — Edit + Delete buttons */
        item.innerHTML =
          '<div class="drag-dots">' +
            '<div class="drag-dot"></div><div class="drag-dot"></div>' +
            '<div class="drag-dot"></div><div class="drag-dot"></div>' +
            '<div class="drag-dot"></div><div class="drag-dot"></div>' +
          '</div>' +
          '<div class="cli-front">' + frontContent + '</div>' +
          '<div class="cli-back">'  + backContent  + '</div>' +
          '<div class="cli-footer">' +
            '<button class="btn-secondary" style="padding:2px 8px;font-size:0.7rem;" onclick="openEditModal(' + index + ')">Edit</button>' +
            '<button class="btn-delete" onclick="deleteCard(' + index + ')">Delete</button>' +
          '</div>';

        list.appendChild(item);
      });
    }

    function deleteCard(index) {
      if (!confirm('Delete this card?')) return;
      cards.splice(index, 1); /* remove one item at this index */
      markDirty();
      renderManageList();
      renderContextLabel();
      studyQueue = []; /* reset so deleted card never appears mid-session */
    }


    /* -----------------------------------------------------------
     * SHARED MODAL — Add Card and Edit Card
     * ----------------------------------------------------------- */

    var editIndex = null; /* null = add mode; a number = edit mode */

    /* openAddModal — New Card mode; blank form */
    function openAddModal() {
      editIndex = null;
      clearDropZone('drop-modal-front', 'text-modal-front');
      clearDropZone('drop-modal-back',  'text-modal-back');
      document.getElementById('modal-title').textContent    = 'New Card';
      document.getElementById('modal-save-btn').textContent = 'Save Card';
      document.getElementById('card-modal').style.display   = 'flex';
    }

    /* openEditModal — Edit Card mode; form pre-filled with existing card content */
    function openEditModal(index) {
      editIndex = index;
      var card  = cards[index];

      clearDropZone('drop-modal-front', 'text-modal-front');
      clearDropZone('drop-modal-back',  'text-modal-back');

      if (card.frontImg) {
        prefillDropZone('drop-modal-front', 'text-modal-front', card.frontImg);
      } else {
        document.getElementById('text-modal-front').value = card.front || '';
      }

      if (card.backImg) {
        prefillDropZone('drop-modal-back', 'text-modal-back', card.backImg);
      } else {
        document.getElementById('text-modal-back').value = card.back || '';
      }

      document.getElementById('modal-title').textContent    = 'Edit Card';
      document.getElementById('modal-save-btn').textContent = 'Save Changes';
      document.getElementById('card-modal').style.display   = 'flex';
    }

    /* prefillDropZone reconstructs the image preview state for an existing card image.
       Mirrors the drop handler in setupDropZone so the zone looks identical
       whether the image was freshly dropped or loaded from a saved card. */
    function prefillDropZone(zoneId, textareaId, imgData) {
      var zone     = document.getElementById(zoneId);
      var textarea = document.getElementById(textareaId);

      zone.dataset.imgData = imgData; /* store so saveModal() can read it */
      textarea.style.display = 'none';
      zone.querySelector('.drop-hint').style.display = 'none';

      var img = document.createElement('img');
      img.src = imgData;
      zone.appendChild(img);

      var btn       = document.createElement('button');
      btn.textContent = 'Remove image';
      btn.className   = 'clear-img-btn';
      btn.onclick     = function() { clearDropZone(zoneId, textareaId); };
      zone.appendChild(btn);
    }

    /* saveModal handles both Add and Edit.
       Reads the form, validates, then pushes or overwrites depending on editIndex.
       Always marks dirty and redraws. */
    function saveModal() {
      var frontZone = document.getElementById('drop-modal-front');
      var backZone  = document.getElementById('drop-modal-back');
      var frontText = document.getElementById('text-modal-front').value.trim();
      var backText  = document.getElementById('text-modal-back').value.trim();
      var frontImg  = frontZone.dataset.imgData || null; /* undefined → null via || */
      var backImg   = backZone.dataset.imgData  || null;

      if (!frontImg && !frontText) { alert('Please add content to the front.'); return; }
      if (!backImg  && !backText)  { alert('Please add content to the back.');  return; }

      if (editIndex === null) {
        /* ADD MODE — push a new card */
        cards.push({
          id:       Date.now(), /* millisecond timestamp — unique enough for an ID */
          front:    frontText,
          back:     backText,
          frontImg: frontImg,
          backImg:  backImg,
          interval: 1
        });
      } else {
        /* EDIT MODE — overwrite content; preserve id and interval */
        cards[editIndex].front    = frontText;
        cards[editIndex].back     = backText;
        cards[editIndex].frontImg = frontImg;
        cards[editIndex].backImg  = backImg;
      }

      markDirty();
      closeModal();
      renderManageList();
      renderContextLabel();
      renderDeckBar(); /* update the dirty • on the pill */
    }

    function closeModal() {
      document.getElementById('card-modal').style.display = 'none';
      editIndex = null;
    }


    /* -----------------------------------------------------------
     * EXPORT (SAVE DECK)
     * -----------------------------------------------------------
     * Resolves the deck name first, then branches on browser capability:
     *
     *   DECK NAME RESOLUTION
     *   ─────────────────────
     *   Named deck active  → use the existing deck name
     *   Scratchpad active  → prompt() the user for a name first,
     *                        then promote the scratchpad to a real deck
     *
     *   SAVE MECHANISM (after name is known)
     *   ──────────────────────────────────────
     *   Chrome / Edge  → showSaveFilePicker()
     *     Opens the OS native Save As dialog with the deck name
     *     pre-filled in the filename field. The user can navigate
     *     to any folder, change the name, or overwrite the original
     *     file. The browser writes directly to the chosen location.
     *     If the user picks the same filename as the original, the
     *     OS handles the overwrite confirmation automatically.
     *     After a successful write we also store the returned
     *     fileHandle on the deck object. A future "quick save"
     *     feature could use that handle to write silently without
     *     re-opening the dialog.
     *
     *   Firefox / other → blob download fallback
     *     Creates an in-memory file and triggers a browser download.
     *     The filename is pre-filled with the deck name so the file
     *     lands in Downloads with the correct name. The user would
     *     need to move it manually if they want it back in its
     *     original location. Not ideal but fully functional.
     *
     *   async / await
     *   ─────────────
     *   showSaveFilePicker() is asynchronous — it returns a Promise
     *   that resolves when the user finishes interacting with the
     *   dialog. We use async/await to write the code in a readable
     *   top-to-bottom style rather than chaining .then() callbacks.
     *   async before function() tells JS this function may pause
     *   and resume. await before an expression pauses execution
     *   until the Promise resolves, then continues with the result.
     *   The try/catch wrapping the picker call catches the case
     *   where the user clicks Cancel in the dialog — the browser
     *   throws an AbortError in that situation, which we silently
     *   ignore so the app doesn't show an error message.
     */

    /* showToast briefly displays a message at the bottom of the screen.
       msg     — the text to show e.g. "Deck saved ✓"
       duration — how long to show it in milliseconds (default 2200)

       How it works:
         1. Set the toast text
         2. Add .visible class  -> CSS opacity:1, toast fades in
         3. After `duration` ms, remove .visible -> CSS opacity:0, toast fades out
       clearTimeout(toastTimer) cancels any in-flight timer so that
       calling showToast() twice quickly doesn't leave a ghost toast visible. */
    var toastTimer = null; /* holds the setTimeout id so we can cancel it */

    function showToast(msg, duration) {
      duration = duration || 2200; /* default 2.2 seconds if not specified */
      var el = document.getElementById('save-toast');
      el.textContent = msg;        /* set the message text */
      el.classList.add('visible'); /* CSS: opacity transitions to 1 */

      clearTimeout(toastTimer);    /* cancel any previous dismiss timer */
      toastTimer = setTimeout(function() {
        el.classList.remove('visible'); /* CSS: opacity transitions back to 0 */
      }, duration);
      /* setTimeout is a built-in JS function that runs a callback after a delay.
         It returns a numeric id we store in toastTimer.
         clearTimeout(id) cancels that scheduled callback if it hasn't fired yet. */
    }


    async function exportJSON() {
      /* ── STEP 1: resolve the deck name ─────────────────────── */

      if (cards.length === 0) { alert('No cards to save.'); return; }

      var deckName;       /* the name used for the filename and deck entry */
      var isScratchpad = (activeDeckIdx === -1); /* true when saving from scratchpad */

      if (!isScratchpad) {
        /* named deck — name already known */
        deckName = decks[activeDeckIdx].name;

      } else if (!window.showSaveFilePicker) {
        /* FIREFOX SCRATCHPAD — prompt() is safe here because we are not
           going to call showSaveFilePicker() afterward.
           On Chrome/Edge, calling prompt() before showSaveFilePicker()
           consumes the user gesture token and causes a security error:
           "Must be handling a user gesture to show a file picker."
           Firefox does not have this restriction because it uses a
           plain blob download instead of the native file picker. */
        deckName = prompt('Name this deck:', 'My Deck');
        if (!deckName) return;
        deckName = deckName.trim();
        if (!deckName) { alert('Please enter a deck name.'); return; }
        var duplicate = decks.some(function(d) { return d.name === deckName; });
        if (duplicate) {
          alert('A deck named "' + deckName + '" is already loaded. Choose a different name.');
          return;
        }

      } else {
        /* CHROME/EDGE SCRATCHPAD — skip prompt() entirely.
           The file picker dialog IS the naming step: we suggest "My Deck"
           and the user renames it directly in the OS save dialog.
           After saving we read the chosen name back from handle.name.
           Using prompt() here would consume the user gesture and cause
           showSaveFilePicker() to throw a SecurityError. */
        deckName = 'My Deck'; /* placeholder — overwritten by handle.name after save */
      }

      /* ── STEP 2: build the JSON content ─────────────────────── */

      var json = JSON.stringify(cards, null, 2); /* 2 = 2-space indentation */
      var blob = new Blob([json], { type: 'application/json' }); /* in-memory file blob */

      /* ── STEP 3: write the file ──────────────────────────────── */

      /* THREE PATHS — checked in order of preference:
         A) deck has a stored fileHandle  → write directly, no dialog
         B) no handle, Chrome/Edge        → showSaveFilePicker dialog, store handle
         C) no handle, Firefox            → blob download to Downloads folder

         Path A is the fix for the deleted-card-reappears bug.
         When a deck is loaded via showOpenFilePicker (openLoadDecks),
         we store the FileSystemFileHandle on the deck object.
         Writing back through that same handle overwrites the original
         file in place — no navigation required, no dialog, no ambiguity
         about which file is being updated. */

      var pickerHandle   = null; /* will hold the handle from Path B if used — needed in Step 4 */
      var existingHandle = !isScratchpad && decks[activeDeckIdx].fileHandle
                           ? decks[activeDeckIdx].fileHandle
                           : null;
      /* existingHandle is the handle stored when the deck was loaded
         (or from a previous save via showSaveFilePicker).
         null when: scratchpad mode, Firefox load, or first-ever save. */

      if (existingHandle) {

        /* ── PATH A: direct write via stored handle — no dialog ── */

        try {
          var writable = await existingHandle.createWritable(); /* open write stream to the source file */
          await writable.write(blob); /* send blob content into the stream */
          await writable.close();     /* flush to disk — file not updated without this */
          /* silent save succeeded — show a brief toast so the user knows it happened */
          showToast('✓ ' + deckName + ' saved');
        } catch (err) {
          alert('Could not save the file: ' + err.message);
          return;
        }

      } else if (window.showSaveFilePicker) {

        /* ── PATH B: Chrome/Edge, no handle yet — Save As dialog ── */

        try {
          /* showSaveFilePicker opens the OS save dialog.
             suggestedName pre-fills the filename field with the deck name.
             The user can navigate anywhere and change the name.
             await pauses until they click Save or Cancel. */
          var handle = await window.showSaveFilePicker({
            suggestedName: deckName + '.json',
            types: [{ description: 'JSON Deck File', accept: { 'application/json': ['.json'] } }]
          });

          var writable = await handle.createWritable();
          await writable.write(blob);
          await writable.close();

          /* always capture the name the user typed in the dialog —
             they may have changed it from the suggestion.
             handle.name is the filename including .json e.g. "Biology 101.json" */
          var savedName = handle.name.replace(/\.json$/i, '');
          deckName      = savedName;  /* update for Step 4 and toast */
          pickerHandle  = handle;     /* store so Step 4 can attach it to the new deck */

          if (!isScratchpad) {
            /* named deck — update the live deck object immediately */
            decks[activeDeckIdx].fileHandle = handle;
            decks[activeDeckIdx].name       = savedName;
          }

        } catch (err) {
          if (err.name === 'AbortError') return; /* user cancelled */
          alert('Could not save the file: ' + err.message);
          return;
        }

      } else {

        /* ── PATH C: Firefox / fallback — blob download ─────────── */

        var url = URL.createObjectURL(blob);
        var a   = document.createElement('a');
        a.href     = url;
        a.download = deckName + '.json';
        a.click();
        URL.revokeObjectURL(url);
        showToast('\u2193 ' + deckName + '.json downloaded');
      }

      /* ── STEP 4: update app state after a successful save ────── */

      if (isScratchpad) {
        /* promote scratchpad to a named deck.
           pickerHandle = the FileSystemFileHandle from Path B, null from Path C.
           slice() copies scratchCards so clearing it below won't empty the new deck. */
        decks.push({
          name:       deckName,
          cards:      scratchCards.slice(),
          dirty:      false,
          fileHandle: pickerHandle   /* enables silent saves going forward */
        });
        activeDeckIdx = decks.length - 1;
        scratchCards  = [];
        syncCards();
      } else {
        clearDirty();
      }


      renderDeckBar();      /* update pill: remove • or show newly promoted deck */
      renderContextLabel(); /* update "Editing: Name (N cards)" label */
      renderManageList();   /* redraw card list under the now-clean deck context */
    }



    /* -----------------------------------------------------------
     * SAVE AS
     * -----------------------------------------------------------
     * Always opens a picker dialog regardless of whether the deck
     * already has a stored fileHandle.
     *
     * Chrome/Edge: showSaveFilePicker with the current deck name
     *   pre-filled. After saving, the returned handle replaces
     *   any existing fileHandle on the deck so future silent saves
     *   go to the new location. Deck name updates to match the
     *   filename the user chose.
     *
     * Firefox: blob download (same as the existing fallback).
     *
     * Scratchpad: same as exportJSON scratchpad path -- prompts
     *   for a name then promotes the scratchpad to a named deck.
     */
    async function saveAsJSON() {
      if (cards.length === 0) { alert('No cards to save.'); return; }

      /* resolve the deck name -- same branching logic as exportJSON step 1:
         prompt() is only called on Firefox (no showSaveFilePicker) because
         on Chrome calling prompt() before showSaveFilePicker() consumes
         the user gesture and causes a "Must be handling a user gesture" error */
      var deckName;
      var isScratchpad = (activeDeckIdx === -1);

      if (!isScratchpad) {
        deckName = decks[activeDeckIdx].name; /* pre-fill with current name */

      } else if (!window.showSaveFilePicker) {
        /* Firefox scratchpad -- prompt() is safe, no picker coming after */
        deckName = prompt('Name this deck:', 'My Deck');
        if (!deckName) return;
        deckName = deckName.trim();
        if (!deckName) { alert('Please enter a deck name.'); return; }
        var duplicate = decks.some(function(d) { return d.name === deckName; });
        if (duplicate) {
          alert('A deck named "' + deckName + '" is already loaded. Choose a different name.');
          return;
        }

      } else {
        /* Chrome/Edge scratchpad -- skip prompt(), let the OS dialog be the naming step */
        deckName = 'My Deck'; /* placeholder — overwritten by handle.name after save */
      }

      var json = JSON.stringify(cards, null, 2);
      var blob = new Blob([json], { type: 'application/json' });

      if (window.showSaveFilePicker) {

        /* Chrome / Edge -- always open the picker regardless of existing handle */
        try {
          var handle = await window.showSaveFilePicker({
            suggestedName: deckName + '.json', /* pre-fill with current name */
            types: [{ description: 'JSON Deck File', accept: { 'application/json': ['.json'] } }]
          });
          var writable = await handle.createWritable();
          await writable.write(blob);
          await writable.close();

          /* replace the stored handle with the one for the new location.
             Future silent saves via Save Deck will go to this new file. */
          if (!isScratchpad) {
            decks[activeDeckIdx].fileHandle = handle;
            var savedName = handle.name.replace(/\.json$/i, '');
            decks[activeDeckIdx].name = savedName;
            deckName = savedName; /* use the final saved name in the toast */
          }

        } catch (err) {
          if (err.name === 'AbortError') return; /* user cancelled */
          alert('Could not save the file: ' + err.message);
          return;
        }

      } else {

        /* Firefox -- blob download with the current deck name pre-filled */
        var url = URL.createObjectURL(blob);
        var a   = document.createElement('a');
        a.href     = url;
        a.download = deckName + '.json';
        a.click();
        URL.revokeObjectURL(url);
        showToast('↓ ' + deckName + '.json downloaded');
      }

      /* update app state -- same as exportJSON step 4 */
      if (isScratchpad) {
        decks.push({
          name:       deckName,
          cards:      scratchCards.slice(),
          dirty:      false,
          fileHandle: null
        });
        activeDeckIdx = decks.length - 1;
        scratchCards  = [];
        syncCards();
      } else {
        clearDirty();
        showToast('✓ ' + deckName + ' saved');
      }

      renderDeckBar();
      renderContextLabel();
      renderManageList();
    }

    /* -----------------------------------------------------------
     * STARTUP
     * ----------------------------------------------------------- */
    setupDropZone('drop-modal-front', 'text-modal-front');
    setupDropZone('drop-modal-back',  'text-modal-back');
    renderDeckBar();      /* draw the initial empty deck bar */
    renderContextLabel();
    initStudy();          /* show study panel in its initial empty state */

  </script>
</body>
</html>
