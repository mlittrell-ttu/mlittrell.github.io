<!DOCTYPE html>                        <!-- Tells the browser this is an HTML5 document -->
<html lang="en">                       <!-- Root element wrapping everything; lang="en" helps screen readers -->
<head>                                 <!-- Head section: invisible setup instructions for the browser -->
  <meta charset="UTF-8" />             <!-- Use UTF-8 encoding so all characters and emoji display correctly -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- Makes the page scale properly on phones -->
  <title>FlashCards</title>              <!-- Text shown in the browser tab -->
  <style> /*Opens the CSS block;everything here controls visual appearance;anything in root is available everywhere */              
    :root {
      --bg:        #f7f2e8;
      --surface:   #fffdf8;
      --border:    #d8cebc;
      --ink:       #2e2416;
      --ink-light: #9e9080;
      --accent:    #e0d5c2;
      --accent2:   #c8bfb0;
      --green:     #8aab8a;
      --shadow:    0 2px 12px rgba(0,0,0,0.10);/* 0=hor. offset, 2=vert. offset(px), 12=blur*/
                                                /*rgba(color) = 0=rbga;.alpha = .10; 1 is solid*/ 
      --radius:    10px; /* default 90° corners in html rounded from 0(default) to 10*/
      --flip-time: 0.5s; /* store 0.5 seconds as our standard animation duration */
    }












    /* This is css reset line. *=wild card target all elements; *::before/after=any generated content before or after element
       box-sizing: border-box=strips out default values and start with 0 so we control it.
       Everything in css is rendered as a box "CSS box model" 4-layers:content, padding, border, margin*/                      
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    /*Everything visible will live in the body.*/
    /*PC knows to draw everything inside body on screen.*/
    /*These are CSS selectors and property/value(collectively called "CSS Rulesets" from {}).
    Selector — the address that tells CSS which element on the page to target.
    Property — the specific thing about that element you want to change, like its color, size,
    Property + value (like min-height:100vh) = CSS Declaration
    Element — a single building block of a webpage, made up of an opening tag, its content, and a closing tag.*/
body {
  font-family: 'Georgia', serif;  /* Georgia as the main font; if unavailable use serif font */
  background: var(--bg);          /* set page background to --bg variable (off-white we defined in :root) */
  color: var(--ink);              /* set text color to our --ink variable (near-black) — all text inheritsunless overridden */
  min-height: 100vh;              /* make the body at least 100% of the viewport height — 100vh = full screen height */
  display: flex;                  /* switch the body to flexbox layout — this changes how its children are arranged */
                                  /* children are the the elements that sit inside another element in html*/
                                  /* elements are building blocks of pages; consist of open tag, content, close tag.*/
                                  /*body is an element.*/
  flex-direction: column;         /* stack children vertically top to bottom (default flex stacks them horizontally) */
  align-items: center;            /* center all children horizontally within the body */
}
/*Header is the cream bar that sits across the page up top and the text.*/
header {
  width: 100%;                      /* stretch header to fill the full width of its parent (the body) */
  background: var(--bg);            /* set background to our --bg variable (warm parchment cream) */
  color: var(--ink);                /* set text color to our --ink variable (dark brown-black) */
  padding: 18px 40px;               /* add space inside the header — 18px top and bottom, 40px left and right */
  display: flex;                    /* make the header a flex container so we can control how its children are arranged */
  align-items: center;              /* vertically center the children (the title and card count) within the header's height */
  justify-content: space-between;   /* push children to opposite ends — title goes far left, card count goes far right */
  box-shadow: var(--shadow);        /* apply our reusable shadow beneath the header to lift it visually off the page */
  border-bottom: 1px solid var(--border); /* thin line separates header from page content below */
}

/* Select h1 within the header. h1 is the biggest title part Flash Cards.*/
    header h1 {               /* target ONLY h1 elements that live inside the header — not all h1s on the page */
  font-size: 1.6rem;         /* set text size to 1.6rem — rem means relative to root font size (usually 16px) so 1.6rem = ~25px */
  letter-spacing: 0.08em;   /* add a tiny gap between each letter — em is relative to current font size, 0.08em is subtle */
  font-weight: normal;       /* override the browser default which makes h1 bold — lighter and more elegant */
}
    header h1 span {    /* target only a span element sitting inside the h1 inside the header — very specific */
  color: var(--ink-light); /* make just that part of the heading text muted — slightly lighter than the main title text */
}
    nav {        /* target the nav element — the tab button row */
  display: flex;  /* make nav a flex container so buttons sit side by side in a row */
  gap: 6px;    /* add 6px of space between each button — gap is a flex property */
}
    nav button {           /* target only buttons that live inside the nav — not all buttons on the page */
  background: transparent;           /* no background fill — button is see-through so cream header shows */
  border: 1px solid var(--border);   /* a thin tan border matching the page border color */
  color: var(--ink);                 /* dark text — readable against the cream header */
  padding: 7px 18px;        /* space inside the button — 7px top and bottom, 18px left and right */
  border-radius: 20px;      /* heavily round the corners — 20px on a small button creates a pill/capsule shape */
  cursor: pointer;          /* change the mouse cursor to a hand when hovering — signals to the user this is clickable */
  font-family: inherit;     /* use whatever font the parent element is using — inherit means "copy it from above" */
  font-size: 0.85rem;       /* slightly smaller than the base font size. rem=relative to root size */
  letter-spacing: 0.04em;   /* small letter spacing*/
  transition: background 0.2s, border-color 0.2s;  /* animate background and border changes smoothly over 0.2 seconds when state changes e.g. on hover */
}
    nav button:hover, /* Targets nav buttons on hover */
    nav button.active {  /* ...AND nav buttons that have the class "active" applied by JavaScript */
  background: var(--accent);         /* give a medium cream fill — visible against the lighter header */
  border-color: var(--border);       /* keep the border consistent */
}
    nav button.active {       /* target ONLY the currently active tab button specifically */
  background: var(--accent);        /* fill with medium cream — visually shows which tab you are on */
  border-color: var(--accent2);     /* slightly darker border so the active pill has a defined edge */
}
    /* main is the content area for any page. body is the whole page including header.*/
    main {       /* target the main content area that holds all the content */
  width: 100%;           /* stretch to fill its parent's full width */
  max-width: 720px;      /* but never grow wider than 720px — keeps content readable on wide screens */
  padding: 40px 20px;   /* 40px margin room top and bottom, 20px left and right */
}
    section {         /* target all section elements — each page (study, add, manage) is a section */
  display: none;      /* hide every section by default — none of them are visible on load */
}
/*a class is a label you attach to an html element;one element can have multiple classes. can be used by css.
  the"."in css means look for elements with this class name.
  section.active is a CSS selector; targetting instructions*/
    section.active {       /* target only the section that has the class "active" on it */
  display: block;  /* make just that one section visible; JS adds/removes this class on tab clicks 
  block properties= takes up full width, always start on new line, stack vertically*/
}
/* An ID (like a class) is a way to label html elements, but is unique to one element (unlike class).*/
    #study-area {            /* target the element with the ID "study-area" — the # means ID selector */
  display: flex;             /* make it a flex container */
  flex-direction: column;    /* stack its children vertically */
  align-items: center;       /* center children horizontally */
  gap: 24px;                 /* add 24px of space between each child automatically */
}
    #progress-label {      /* target the element with ID "progress-label" — shows "card 1 of 12" etc. */
  font-size: 0.85rem;      /* slightly smaller than body text */
  color: var(--ink-light); /* use our muted color */
  letter-spacing: 0.05em;  /* slight letter spacing */
}
  .card-scene {         /* target any element with the CLASS "card-scene" — the . means class selector */
  width: 100%;          /* fill available width */
  max-width: 520px;     /* but cap it at 520px so the card doesn't stretch too wide */
  height: 300px;        /* fixed height — the card needs a defined height for the 3D flip to work */
  perspective: 1000px;  /* set the 3D depth perspective — high number = more subtle 3D effect, low = more dramatic */
  cursor: pointer;      /* show a hand cursor on hover*/
}
.card-inner {                         /* . means class selector
  width: 100%;                        /* fill the full width of its parent (.card-scene) */
  height: 100%;                       /* fill the full height of its parent (.card-scene) */
  position: relative;                 /* establish this as a positioning reference point for its children (the front and back faces) */
  transform-style: preserve-3d;       /* tell browser to treat children as 3D, not flat — for the flip to look 3D */
  transition: transform var(--flip-time) ease;  /* when the transform property changes, animate it over our flip-time var (0.5s); "ease" means it start fast, slows at end */
}
    .card-inner.flipped {     /* target .card-inner elements that also have the class "flipped" added by JS*/
  transform: rotateY(180deg); /* rotate the entire card 180 degrees around the vertical Y axis */
}
    .card-face {
  position: absolute; /* remove element from normal document flow and position it relative to its nearest positioned parent (.card-inner which has position:relative) */
  inset: 0;                        /* shorthand for top:0, right:0, bottom:0, left:0 — stretches the face to fill its parent completely */
  background: var(--surface);      /* set background to our surface color */
  border: 1px solid var(--border); /* thin visible edge using our border color var */
  border-radius: var(--radius);    /* round the corners */
  box-shadow: var(--shadow);       /* apply our drop shadow */
  display: flex;                   /* make this face a flex container so its children can be arranged */
  flex-direction: column;          /* stack children vertically */
  align-items: center;             /* center children horizontally */
  justify-content: center;         /* center children vertically — combined with above this puts content dead center */
  padding: 30px;                   /* 30px breathing room between the card edge and the content inside */
  backface-visibility: hidden;     /* hide this face when it is rotated away from the viewer — critical for the flip effect */
  text-align: center;              /* center any text content inside the card */
}
    .card-face.back {
  transform: rotateY(180deg);  /* pre-rotate the back face 180 degrees so it starts hidden*/
  background: #f0e9d8;         /* give back a slightly deeper cream tint to visually distinguish it from front */
}
 /* This is what produces the small "click to reveal" and "how did you do?" text sitting at the bottom of each card.*/  
.card-face .hint {     /* target elements with class "hint" that live inside a .card-face — note the space meaning descendant */
  position: absolute;          /* pull this element out of normal flow so we can place it precisely within the card face */
  bottom: 12px;                /* pin it exactly 12px from the bottom edge of the card face — works because .card-face has position:relative as its parent */
  font-size: 0.75rem;          /* make it smaller than body text — this is secondary information, not the main content */
  color: var(--ink-light);     /* use our muted brown color to de-emphasise it — it should be noticeable but not distracting */
  letter-spacing: 0.05em;      /* slight letter spacing makes it feel like a subtle label rather than main content */
}
 /* The main content text displayed on each card face; the question on front, the answer on back */
.card-face .card-text {
  font-size: 1.4rem;    /* larger than body text — the primary text user needs to read */
  line-height: 1.5;     /* each line of text has 1.5x the font size as spacing above it — prevents lines feeling cramped */
  overflow-y: auto;     /* if text is taller than the card face, make it scrollable rather than spilling out */
  max-height: 100%;     /* cap the text container at the full height of its parent card face — nothing can escape beyond it */
  width: 100%;          /* stretch to full width of the card face so text wraps properly before it ever needs to scroll */
}
    /* Images dropped onto a card face — keeps them contained and neatly rounded within the card */
.card-face img {
  max-width: 100%;       /* never let the image grow wider than card face */
  max-height: 220px;     /* cap the height at 220px */
  border-radius: 6px;    /* slightly round the image corners */
  object-fit: contain;   /* scale the image to fit within its bounds while preserving its proportions */
}
    /* The row of "Got It" and "Review Again" buttons that appear after flipping a card */
#rating-buttons {  /* # is an id selector.*/
  display: flex;   /* place the two buttons side by side in a row rather than stacking vertically */
  gap: 16px;       /* add 16px of space between the two buttons */
}
/* The "Got It" button that appears after flipping a card — marks the card as learned */
.btn-got-it {
  background: var(--green);   /* medium cream fill — slightly more prominent than the lighter Review Again button */
  color: var(--ink);           /* dark brown-black text — high contrast on the cream background */
  border: 1px solid var(--accent2); /* slightly darker cream border gives it a defined edge */
  padding: 12px 32px;     /* 12px top and bottom, 32px left and right */
  border-radius: 24px;    /* rounded corners — 24px */
  font-size: 1rem;        /* match the base body font size */
  cursor: pointer;        /* show a hand cursor on hover */
  font-family: inherit;   /* use font the parent element is using rather than browser default */
  transition: opacity 0.2s;  /* when opacity changes on hover, animate it over 0.2 seconds */
}
   /* The "Review Again" button that appears after flipping a card — sends the card to the back of the queue */
.btn-again {
  background: var(--surface);  /* lightest cream — visually lighter than Got It to distinguish the two actions */
  color: var(--ink);           /* dark brown-black text — high contrast on the near-white background */
  border: 1px solid var(--border); /* tan border gives it a defined edge */
  padding: 12px 32px;          /* 12px top and bottom, 32px left and right */
  border-radius: 24px;         /* same heavy rounding as Got It*/
  font-size: 1rem;             /* match the base body font size */
  cursor: pointer;             /* show a hand cursor on hover */
  font-family: inherit;        /* copy the font from the parent rather than using the browser default */
  transition: opacity 0.2s;    /* animate opacity changes over 0.2s for the hover */
}

/* The visual feedback when the mouse hovers over either rating button */
/* targeting two selectors with one rule using a comma; avoids writing the same rule twice */
/* .btn-got-it = class selector, :hover = pseudo-class that activates only when mouse is over the element 
 ":" signals a pseudo class
 Pseudo-class — a condition the browser tracks automatically based on user behaviour or element state, 
 written with a colon; P-Classes you never add or remove yourself. regular classes are add/rm directly with js and html*/
.btn-got-it:hover,
.btn-again:hover {
  opacity: 0.85;   /* reduce to 85% opacity on hover */
}


/* The message shown in the study area when there are no cards yet, or when a session is complete */
#empty-study { /* #=id selector.*/
  text-align: center;        /* center stand alone text horizontally */
  color: var(--ink-light);   /* use our muted color */
  font-size: 1.1rem;         /* slightly larger than body text */
  padding: 60px 20px;        /* 60px top and bottom pushes the message away from the edges */
  line-height: 1.8;          /* line spacing — this message may span multiple lines so extra space keeps it readable */
}


/* The white container box that holds the card creation form on the Add Card panel */
.card-editor { /* .=class selector.*/
  background: var(--surface);      /* light color*/
  border: 1px solid var(--border); /* thin  edge to the box */
  border-radius: var(--radius);  /* round the corners*/
  padding: 28px;               /* 28px on all four sides between the box edge and the form content inside */
  box-shadow: var(--shadow);   /* drop shadow */
}


/* The "New Flashcard" heading at the top of the card editor form — styled as a subtle section label rather than a bold title */
.card-editor h2 {
  margin-bottom: 24px;   /* push everything below the heading down 24px — creates separation b/t the title and form fields */
  font-weight: normal;   /* override browser default that would make h2 bold */
  font-size: 1.2rem;     /* slightly larger than body text */
  color: var(--ink-light); /* muted color*/
  letter-spacing: 0.05em;  /* slight spacing between letters */
  border-bottom: 1px solid var(--border);  /* thin line under the heading, visually separates the title from the form content below */
  padding-bottom: 10px;  /* 10px gap b/t the text and border-bottom line; without this the line sits against the text */
}


/* A wrapper around each form field (label + drop zone) in the card editor — adds space between each field */
.field-group {
  margin-bottom: 24px; /* push the next field group down 24px; creates vertical separation b/t the Front/Back sections */
}

/* The small uppercase labels above each drop zone in the card editor — "FRONT" and "BACK" */
.field-group label { /* .field-group = class we define; label = html element that pre-exists. both must be true. 
  display: block;   /* labels inline by default; block makes it take up its own full line so the drop zone starts below it */
  font-size: 0.8rem;    /* smaller than body text — this is a supporting label not main content */
  letter-spacing: 0.08em;   /* wider letter spacing than body text — combined with uppercase makes it feel like a quiet heading */
  text-transform: uppercase; /* automatically converts the text to capitals regardless of how it is typed in the HTML */
  color: var(--ink-light);   /* muted brown — de-emphasised, the drop zone below it is the main focus */
  margin-bottom: 8px;        /* small gap between the label and the drop zone directly below it */
}
/* The dashed box on the card editor where users type text or drag and drop an image onto the card */
.drop-zone {
  border: 2px dashed var(--border);   /* dashed border */
  border-radius: var(--radius);        /* round the corners */
  padding: 20px;             /* 20px breathing room on all sides between the border and the content inside */
  min-height: 120px;         /* guarantee a minimum height so the zone is always a large enough target to drop onto — without this it would collapse to just the size of its content */
  display: flex;             /* make the zone a flex container*/
  flex-direction: column;    /* stack children vertically — textarea above the drop hint text */
  align-items: center;       /* center children horizontally */
  justify-content: center;   /* center children vertically */
  gap: 10px;                 /* 10px space between each child element inside the zone */
  
  /* watch border-color and background and animate both when they change*/
  transition: border-color 0.2s, background 0.2s;  /* animate both border color and background — used when a file is dragged over to give visual feedback */
  position: relative;  /* establish this as a positioning reference point for any absolutely positioned children inside it */
}
 /* The drop zone when a file is actively being dragged over it; gives visual feedback that the zone is ready to receive the file */
.drop-zone.drag-over { /* no space with .=targets elements with both these classes being true*/ 
  border-color: var(--accent2); /* change the border to our accent color; rdy for drop*/
  background: #f5ede0;   /* warm parchment tint to the background; reinforces active state visually */
}
/* The text input area inside the drop zone where users type the front or back of a card */
.drop-zone textarea {
  width: 100%;              /* stretch to fill the width of the drop zone */
  border: none;             /* remove the default border browsers put around textareas */
  background: transparent;  /* make the text area see-through */
  resize: none;             /* remove default resize handle browsers put in the corner of textareas */
  font-family: inherit;     /* copy font from the parent rather than using the browser default */
  font-size: 1rem;          /* match the base body font size */
  color: var(--ink);        /* color for the typed text */
  outline: none;            /* remove default glow browsers added when textarea is clicked and active */
  min-height: 80px;         /* minimum height */
}
    /* The image preview that appears inside the drop zone after a user drags an image onto the card editor */
.drop-zone img {
  max-width: 100%;       /* prevents overflow */
  max-height: 180px;     /* cap the height */
  border-radius: 6px;    /*  round corners */
  object-fit: contain;   /* scale image to fit within bounds */
}
   /* The small "— or drag & drop an image here —" text sitting inside the drop zone */
.drop-hint {
  font-size: 0.78rem;      /* smaller than body text  */
  color: var(--ink-light); /* muted  to de-emphasise it */
}

/* The small "Remove image" link that appears after an image is dropped — lets the user clear it and go back to text input */
.clear-img-btn {
  font-size: 0.75rem;        /* smaller than body text */
  color: var(--accent);      /*  accent color */
  background: none;          /* remove any background — looks like a text link not a button */
  border: none;              /* remove the default browser border on buttons */
  cursor: pointer;           /* show a hand cursor on hover */
  padding: 0;                /* remove all padding — keeps it link-like with no extra space around it */
  font-family: inherit;      /* copy the font from the parent */
  text-decoration: underline; /* add an underline to look like a traditional text link rather than a button */
}

/* The main "Save Card" button at the bottom of the card editor */
.btn-primary {
  background: var(--accent);       /* medium cream background — stands out from the white card editor surface */
  color: var(--ink);               /* dark brown-black text — high contrast on cream */
  border: 1px solid var(--accent2); /* slightly darker cream border for a clean defined edge */
  padding: 12px 32px;          /* 12px top and bottom, 32px left and right */
  border-radius: 24px;         /* rounded corners */
  font-size: 0.95rem;          /* slightly below body text size */
  cursor: pointer;             /* show a hand cursor on hover */
  font-family: inherit;        /* copy the font from the parent */
  letter-spacing: 0.04em;      /* subtle letter spacing */
  transition: background 0.2s; /* when background color changes on hover — animate it over 0.2s */
}
    
/* The "Save Card" button when the mouse hovers over it */
.btn-primary:hover {
  background: var(--border);   /* shift to a slightly darker tan-cream on hover to signal interactivity */
}

/* The small "Card saved!" confirm message that briefly appears beside the Save Card button after save */
#save-feedback {
  font-size: 0.85rem;     /* smaller than body text */
  color: var(--green);     /* green color */
  margin-left: 14px;       /* push it 14px away from the Save Card button sitting to left */
  opacity: 0;              /* start completely invisible, JS makes it appear briefly then fades it out */
  transition: opacity 0.4s; /* when opacity changes animate it over 0.4s */
}
/* The two buttons at the top of the Manage panel — Export, Import, and any other toolbar actions */
.manage-toolbar {
  display: flex;         /* place the export/import toolbar buttons side by side in a row */
  gap: 10px;             /* add 10px space between each button */
  margin-bottom: 24px;   /* push the card list below down 24px; separates the toolbar from the cards */
  flex-wrap: wrap;       /* if the buttons run out of horizontal space allow them to wrap onto a new line */
}

/* The secondary action buttons in the toolbar — Export and Import — less visually prominent than the primary Save Card button */
.btn-secondary {
  background: var(--surface);          /* button background  */
  color: var(--ink);                   /* text color*/
  border: 1px solid var(--border);     /* thin visible edge*/
  padding: 9px 20px;                   /* small padding */
  border-radius: 20px;                 /* heavily rounded corners */
  font-size: 0.85rem;                  /* smaller than primary */
  cursor: pointer;                     /* hand cursor on hover */
  font-family: inherit;                /* copy font from parent rather than browser default */
  transition: background 0.2s;         /* setsup animate background color over 0.2s on hover; readys it. */
}
    /* The Export/Import buttons when the mouse hovers over them. */
.btn-secondary:hover {
  background: var(--border);   /* swap background from var(--surface) to var(--border) on hover */
}
    /* The container that holds all the card rows in the Manage panel */
#card-list { /*Id selector */
  display: flex;        /* make this a flex container */
  flex-direction: column;  /* stack the card rows vertically */
  gap: 12px;               /* 12px of space between each card row */
}

/* Each individual card row in the Manage panel — shows a preview of the front, back, and a delete button */
.card-list-item {
  background: var(--surface);          /* background color */
  border: 1px solid var(--border);     /* thin edge */
  border-radius: var(--radius);        /* round corners */
  padding: 16px 20px;                  /* 16px top and bottom, 20px left and right inside each row */
  display: flex;                       /* make this row a flex container so its children sit side by side */
  align-items: center;                 /* vertically center the children — front/back preview, and delete button align horizontally */
  justify-content: space-between;      /* push children to opposite ends — preview text to the left, delete button to the right */
  gap: 12px;                           /* 12px space between each child element inside the row */
  cursor: grab;                        /* makes the card draggable in manage.*/
}

/* new ruleset for the dragged card in manage; makes it opaque.*/
.card-list-item.dragging {
  opacity: 0.4;
}

/* The dot grid handle on the left of each manage row — signals the row is draggable.
   Two columns of three dots arranged in a tight grid; purely visual, no interaction of its own.
   display:grid with two columns lets the dots pair up naturally into a 2×3 formation. */
.drag-handle {
  display: grid;                        /* grid layout so dots snap into 2 columns automatically */
  grid-template-columns: repeat(2, 4px); /* two columns, each exactly 4px wide — sizes the grid to the dot width */
  gap: 3px;                             /* 3px between every dot both horizontally and vertically */
  padding: 2px;                         /* tiny outer padding so the handle doesn't sit flush against the row edge */
  flex-shrink: 0;                       /* prevent the handle from shrinking if the row runs out of space */
  cursor: grab;                         /* show grab cursor specifically on the handle — clearest signal of draggability */
}

/* Each individual dot in the drag handle grid */
.drag-handle-dot {
  width: 3px;                   /* fixed width — small enough to look like a subtle affordance */
  height: 3px;                  /* fixed height — equal to width so each dot is a perfect circle */
  border-radius: 50%;           /* 50% turns a square into a circle */
  background: var(--accent2);   /* muted tan from our parchment palette — visible but not distracting */
}

    /* The front card text preview shown in each row of the Manage panel */
.card-list-preview {
  flex: 1;                    /* take up all space in the row*/
  font-size: 0.9rem;          /* smaller than body text */
  color: var(--ink);          /* text color */
  overflow: hidden;           /* hide any text that extends beyond the element's width */
  white-space: nowrap;        /* force all text onto a single line — no wrapping onto a second line */
  text-overflow: ellipsis;    /* when text is cut off by overflow:hidden show "..." at the end */
}
    /* The small "to" separator arrow sitting between the front and back previews in each card row */
.card-list-preview .arrow {
  color: var(--ink-light);   /* muted color */
  margin: 0 8px;             /* 0 top and bottom, 8px left and right — adds room either side of the arrow */
}
    /* The small thumbnail image shown in a card row when the card contains an image, not text */
.card-list-preview img {
  width: 36px;              /* fix the width to exactly 36px  */
  height: 36px;             /* fix the height to exactly 36px */

/* LOOP finds every section element on the page and loops through them all

                     after this line the <img> tag no longer exists in the HTML

   LINE 4 — removes the button from the page if one was found
   if (btn)        — same guard pattern as line 3
                     truthy if querySelector found the button, falsy if null
   btn.remove()    — built-in method, detaches the button from the page
                     after this line the "Remove image" button no longer exists
                     JS CONNECTION: zone.appendChild(btn) originally added it */
      var img = zone.querySelector('img');
      var btn = zone.querySelector('.clear-img-btn');
      if (img) img.remove();
      if (btn) btn.remove();

      
      /* restores the drop hint text and textarea back to visible
   reverses what the drop handler hid when an image was dropped
   drop zone is now back to its original empty state ready for new input

   LINE 1 — makes the drop hint text visible again
   zone            — variable WE created at the top of clearDropZone
                     holds the drop zone element
                     HTML CONNECTION: <div class="drop-zone" id="drop-front">
   .               — dot notation
   querySelector   — built-in method that searches INSIDE zone only
                     returns the FIRST matching element or null if not found
   ('.drop-hint')  — CSS class selector WE defined, finds the drop hint div
                     HTML CONNECTION: <div class="drop-hint">
                     CSS CONNECTION: .drop-hint ruleset styles this element
   .               — dot notation
   style           — built-in property on every HTML element
                     gives access to the element's inline CSS styles
   .               — dot notation
   display         — the CSS display property WE are setting via JavaScript
   = ''            — assignment, sets display to an empty string
                     empty string means "remove whatever inline style was set"
                     hands control back to the stylesheet which shows it normally
                     JS CONNECTION: reverses zone.querySelector('.drop-hint').style.display = 'none'
                     set in the drop handler when the image was first dropped

   LINE 2 — makes the textarea visible again
   textarea        — variable WE created at the top of clearDropZone
                     holds the textarea element
                     HTML CONNECTION: <textarea id="text-front">
                     or               <textarea id="text-back">
   .style.display  — same built-in property chain as line 1
   = ''            — same empty string technique as line 1
                     removes the inline display:none that was hiding it
                     JS CONNECTION: reverses textarea.style.display = 'none'
                     set in the drop handler when the image was first dropped

   BEFORE clearDropZone        AFTER clearDropZone
   [                    ]      [ textarea              ]
   [   image preview    ]      [ — drag & drop image — ]
   [   Remove image     ]      [                       ] */
      zone.querySelector('.drop-hint').style.display = '';
      textarea.style.display = '';
    }


    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
  /* -----------------------------------------------------------
     * SAVE CARD
     * -----------------------------------------------------------
     * Reads the editor form, validates it, builds a card object,
     * and pushes it into the cards array.
     */

    function saveCard() {                                            // runs when the user clicks the Save Card button
      var frontZone = document.getElementById('drop-front');         // grabs the front drop zone element so we can check it for image data later
      var backZone  = document.getElementById('drop-back');          // grabs the back drop zone element for the same reason
      var frontText = document.getElementById('text-front').value.trim(); // reads whatever the user typed in the front textarea; trim() removes any leading or trailing whitespace
      var backText  = document.getElementById('text-back').value.trim();  // same for the back textarea

      // dataset.imgData is set by the drop handler, or undefined if no image
      var frontImg = frontZone.dataset.imgData || null;   // reads the base64 image string stored on the front drop zone when an image was dropped; if no image was dropped dataset.imgData is undefined so || null makes it explicitly null
      var backImg  = backZone.dataset.imgData  || null;   // same for the back drop zone

      if (!frontImg && !frontText) { alert('Please add content to the front.'); return; }
      if (!backImg  && !backText)  { alert('Please add content to the back.');  return; }

      var card = {
        id:       Date.now(),   // Date.now() returns current time as a unique number
        front:    frontText,    // text (empty string if only an image was used)
        back:     backText,
        frontImg: frontImg,     // base64 string or null
        backImg:  backImg,
        interval: 1             // start at interval 1
      };

      cards.push(card);  // push() adds the card to the end of the array

      // Reset the form for the next card
      document.getElementById('text-front').value = '';
      document.getElementById('text-back').value  = '';
      clearDropZone('drop-front', 'text-front');
      clearDropZone('drop-back',  'text-back');

      // Show a brief "Card saved!" confirmation
      var feedback = document.getElementById('save-feedback');
      feedback.style.opacity = 1;
      // setTimeout runs a function after a delay — 1800ms = 1.8 seconds
      setTimeout(function() { feedback.style.opacity = 0; }, 1800);
    }


    /* -----------------------------------------------------------
     * STUDY MODE
     * -----------------------------------------------------------
     * Uses a queue system:
     *   "Got It"       → card removed from queue (done for this session)
     *   "Review Again" → card moved to END of queue (comes back around)
     * Session ends only when the queue is completely empty.
     */

    var studyQueue = [];  // working copy of cards for this session
    var gotItCount = 0;   // how many marked Got It this session
    var totalCount = 0;   // total cards when session started
    var shuffleOn  = false; //var to track wether shuffle is on or off.
    var dragSrcIndex = null; // tracks which card being dragged in manage; holds position number for order.

    function toggleShuffle() {
  shuffleOn = !shuffleOn;  // flip between true and false each time clicked

  var btn = document.getElementById('btn-shuffle');
  if (shuffleOn) {
    btn.style.background   = 'var(--accent)';  // filled accent color when on
    btn.style.color        = 'white';
    btn.style.borderColor  = 'var(--accent)';
  } else {
    btn.style.background   = '';  // empty string hands control back to the stylesheet
    btn.style.color        = '';
    btn.style.borderColor  = '';
  }

  initStudy();  // always trigger a full session reset when toggled
}

    
    function initStudy() {
      if (cards.length === 0) {
        document.getElementById('empty-study').style.display = '';
        document.getElementById('empty-study').innerHTML =
          'No cards yet!<br>Go to <strong>Add Card</strong> to create your first flashcard.';
        document.getElementById('study-deck').style.display = 'none';
        return;
      }

      // slice() makes a shallow copy — the queue is independent from the
      // real cards array so removing items here doesn't affect your data
      studyQueue = cards.slice();

if (shuffleOn) {
  for (var i = studyQueue.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));  // pick a random index from 0 up to i
    var temp = studyQueue[i];                      // swap the two cards
    studyQueue[i] = studyQueue[j];
    studyQueue[j] = temp;
  }
}

gotItCount = 0;
totalCount = cards.length;

      document.getElementById('empty-study').style.display = 'none';
      document.getElementById('study-deck').style.display  = 'flex';
      loadCard();
    }

    function loadCard() {
      // Queue empty means every card was marked Got It — session complete
      if (studyQueue.length === 0) {
        document.getElementById('study-deck').style.display  = 'none';
        document.getElementById('empty-study').style.display = '';
        document.getElementById('empty-study').innerHTML =
          '&#127881; All ' + totalCount + ' cards mastered!<br><br>' +
          '<button class="btn-primary" onclick="initStudy()">Study Again</button>';
        return;
      }

      // The card at index 0 is always the current card
      var card = studyQueue[0];

      // Progress: shows Got It count and how many are still in the queue
      document.getElementById('progress-label').textContent =
        'Got It: ' + gotItCount + ' / ' + totalCount +
        '  \u00B7  Remaining: ' + studyQueue.length;

      // Fill the front and back faces of the flip card
      setCardContent('card-front-content', card.frontImg, card.front);
      setCardContent('card-back-content',  card.backImg,  card.back);

      // Reset to unflipped state, hide rating buttons
      document.getElementById('card-inner').classList.remove('flipped');
      document.getElementById('rating-buttons').style.display = 'none';
    }

    // Fill a card face — shows image if one exists, otherwise shows text
    function setCardContent(elementId, imgData, text) {
      var el = document.getElementById(elementId);
      if (imgData) {
        // innerHTML injects actual HTML — here an <img> tag with the base64 src
        el.innerHTML = '<img src="' + imgData + '" alt="card image">';
      } else {
        // textContent is safer for plain text — won't interpret HTML tags
        el.textContent = text || '';
      }
    }

    function flipCard() {
      var inner   = document.getElementById('card-inner');
      var flipped = inner.classList.toggle('flipped');  // toggle returns true if class was added
      // Show rating buttons only after card is flipped to reveal the answer
      document.getElementById('rating-buttons').style.display = flipped ? 'flex' : 'none';
    }

    function rateCard(gotIt) {
      // shift() removes and returns the FIRST item in the array
      // like lifting the top card off a physical deck
      var card = studyQueue.shift();

      if (gotIt) {
        // Double the interval (spaced repetition), cap at 30
        card.interval = Math.min(card.interval * 2, 30);
        gotItCount++;
      } else {
        // push() adds the card to the END of the queue — it comes back later
        card.interval = 1;
        studyQueue.push(card);
      }

      loadCard();  // load whatever is now at the front of the queue
    }


    /* -----------------------------------------------------------
     * MANAGE VIEW — list all cards with delete buttons
     */

    function renderManageList() {
      var list  = document.getElementById('card-list');
      var empty = document.getElementById('empty-manage');
      list.innerHTML = '';  // wipe the current list before re-drawing

      if (cards.length === 0) {
        empty.style.display = '';
        return;
      }
      empty.style.display = 'none';

      // Loop through all cards and build a row for each one
      cards.forEach(function(card, index) {
        var item = document.createElement('div');
        item.className = 'card-list-item';
        item.draggable = true;
        item.addEventListener('dragstart', function() {
          dragSrcIndex = index;       // remember which card we picked up
          item.classList.add('dragging');  // fade it out
});
        item.addEventListener('dragend', function() {
        item.classList.remove('dragging');  // restore opacity when drag ends
});
        item.addEventListener('dragover', function(e) {
          e.preventDefault();  // same as the image drop zones — must call this to allow dropping
});
        item.addEventListener('drop', function() {
          if (dragSrcIndex === null || dragSrcIndex === index) return;  // dropped on itself, do nothing
          var moved = cards.splice(dragSrcIndex, 1)[0];  // remove the dragged card from its old position
          cards.splice(index, 0, moved);                 // insert it at the new position
          dragSrcIndex = null;
          renderManageList();  // redraw the list to reflect the new order
});

        // Show a thumbnail for image cards, or the first 40 characters of text
        var frontPreview = card.frontImg
          ? '<img src="' + card.frontImg + '" alt="img">'
          : (card.front || '').substring(0, 40) + ((card.front || '').length > 40 ? '...' : '');

        var backPreview = card.backImg
          ? '<img src="' + card.backImg + '" alt="img">'
          : (card.back || '').substring(0, 40) + ((card.back || '').length > 40 ? '...' : '');

        item.innerHTML =
          '<div class="drag-handle">' +        /* dot grid on the far left — visual cue that the row is draggable */
            '<div class="drag-handle-dot"></div>' +  /* dot 1 — top left */
            '<div class="drag-handle-dot"></div>' +  /* dot 2 — top right */
            '<div class="drag-handle-dot"></div>' +  /* dot 3 — middle left */
            '<div class="drag-handle-dot"></div>' +  /* dot 4 — middle right */
            '<div class="drag-handle-dot"></div>' +  /* dot 5 — bottom left */
            '<div class="drag-handle-dot"></div>' +  /* dot 6 — bottom right */
          '</div>' +
          '<div class="card-list-preview">' +
            frontPreview +
            '<span class="arrow"> → </span>' +
            backPreview +
          '</div>' +
          '<button class="btn-delete" onclick="deleteCard(' + index + ')">Delete</button>';

        list.appendChild(item);
      });
    }

    function deleteCard(index) {
      if (!confirm('Delete this card?')) return;
      // splice(index, 1) removes exactly one item at that position
      cards.splice(index, 1);
      renderManageList();  // re-draw the list
      studyQueue = [];     // reset study queue so deleted card doesn't appear mid-session
    }


    /* -----------------------------------------------------------
     * JSON EXPORT
     * -----------------------------------------------------------
     * Converts the cards array to a JSON text file and triggers
     * a browser download. No server needed — all in the browser.
     */

    function exportJSON() {
      if (cards.length === 0) { alert('No cards to export.'); return; }

      // JSON.stringify(data, null, 2) — the 2 means 2-space indentation
      var json = JSON.stringify(cards, null, 2);

      // Blob is an in-memory file-like object
      var blob = new Blob([json], { type: 'application/json' });

      // createObjectURL makes a temporary URL pointing to the blob
      var url = URL.createObjectURL(blob);

      // Create a hidden link, set it to download, click it, then clean up
      var a      = document.createElement('a');
      a.href     = url;
      a.download = 'flashdeck_cards.json';
      a.click();
      URL.revokeObjectURL(url);  // free the memory used by the temporary URL
    }


    /* -----------------------------------------------------------
     * JSON IMPORT
     * -----------------------------------------------------------
     * Reads a JSON file the user picks, parses it, and REPLACES
     * the current cards array with the imported cards.
     * Simple and predictable — no duplicate merging needed.
     */

    function importJSON(event) {
      var file = event.target.files[0];
      if (!file) return;

      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          var imported = JSON.parse(e.target.result);

          // Basic validation — it must be an array
          if (!Array.isArray(imported)) {
            alert('Invalid file — expected a JSON array of cards.');
            return;
          }

          // Replace the current cards with the imported ones
          cards = imported;

          // Reset study queue so it picks up the newly loaded cards
          studyQueue = [];
          gotItCount = 0;
          totalCount = 0;

          alert('Loaded ' + cards.length + ' card(s) successfully.');
          renderManageList();
          initStudy();

        } catch (err) {
          // JSON.parse throws an error if the text is not valid JSON
          alert('Could not read that file — make sure it was exported from FlashDeck.');
        }
      };
      reader.readAsText(file);

      // Reset the input so the same file can be re-imported if needed
      event.target.value = '';
    }


    /* -----------------------------------------------------------
     * STARTUP
     * -----------------------------------------------------------
     * Runs once when the page first loads.
     * Cards always start empty — load from JSON file if needed.
     */
    setupDropZone('drop-front', 'text-front');
    setupDropZone('drop-back',  'text-back');
    initStudy();

  </script>
